replicaCount: 1

image:
  repository: ghcr.io/moguifeng-9119/aperture
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: aperture.local

resources:
  limits:
    memory: 256Mi
    cpu: 500m
  requests:
    memory: 128Mi
    cpu: 100m

persistence:
  enabled: true
  size: 1Gi

config:
  server:
    host: "0.0.0.0"
    port: 8080
  admin:
    key: ""
  routing:
    default_model: gpt-4o-mini
    default_provider: openai
    strategies:
      - name: rule
        enabled: true
    rules: []
    fallback:
      retry:
        max_attempts: 2
        backoff: 500ms
        max_backoff: 5s
      models: []
  providers: []
  logging:
    level: info
    format: json

env:
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GROQ_API_KEY: ""
